<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTS Ansatte</title>
<style>
    @font-face {
        font-family: 'Sparebank 1 Sans';
        src: url('resources/Museo Sans 500.otf') format('opentype');
        font-weight: 500;
        font-style: normal;
    }
    
    @font-face {
        font-family: 'Sparebank 1 Sans';
        src: url('resources/Museo Sans 700.otf') format('opentype');
        font-weight: 700;
        font-style: normal;
    }

    :root { 
        --sb1-blue: #002776; 
        --sb1-light-blue: #0072c1; 
    }

    body { 
        font-family: 'Sparebank 1 Sans', Arial, sans-serif; 
        font-weight: 500;
        padding: 40px 20px; 
        color: var(--sb1-blue); 
        background-color: white;
    }

    .employee-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
        gap: 40px 20px; 
        max-width: 1100px; 
        margin: 0 auto; 
    }

    .employee-card { 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        text-align: center; 
    }

    /* BILDESIRKLENE SOM MANGLA */
    .image-wrapper { 
        width: 180px; 
        height: 180px; 
        border-radius: 50%; 
        overflow: hidden; 
        margin-bottom: 15px; 
        background: #f4f4f4; 
    }

    .image-wrapper img { 
        width: 100%; 
        height: 100%; 
        object-fit: cover; 
    }

    .name { 
        font-size: 1.1rem; 
        font-weight: 700; 
        margin-bottom: 5px; 
    }

    .role { 
        font-size: 0.9rem; 
        color: #555; 
        margin-bottom: 8px; 
        font-weight: 500;
    }

    .phone { 
        font-size: 0.9rem; 
        font-weight: 500; 
        margin-bottom: 5px; 
    }
    
    .email-link { 
        font-size: 0.9rem;
        color: var(--sb1-light-blue); 
        text-decoration: underline; 
    }

    #error-log { 
        color: #cc0000; 
        background: #fff5f5; 
        padding: 20px; 
        border: 1px solid #ffcccc; 
        border-radius: 5px; 
        margin: 20px auto; 
        max-width: 800px; 
        display: none; 
        white-space: pre-wrap; 
        font-family: monospace;
    }
</style>
</head>
<body>

    <div id="error-log"></div>
    <div class="employee-grid" id="staff-list"></div>

    <script>
        async function fetchStaff() {
            const errorLog = document.getElementById('error-log');
            const container = document.getElementById('staff-list');

            try {
                const response = await fetch('employees.json?nocache=' + Math.random());
                
                if (!response.ok) {
                    throw new Error(`Fant ikke employees.json (Status: ${response.status}).`);
                }
                
                const data = await response.text();
                let employees;
                
                try {
                    employees = JSON.parse(data);
                } catch (jsonErr) {
                    throw new Error(`Feil i JSON-formatet.`);
                }

                // --- SORTERINGSLOGIKK ---
                const leaderRole = "Leder digitale tjenester support";
                
                // Finn lederen
                const leader = employees.find(emp => emp.role === leaderRole);
                // Finn alle andre
                const others = employees.filter(emp => emp.role !== leaderRole);
                
                // Sorter de andre alfabetisk på fornavn
                others.sort((a, b) => a.name.localeCompare(b.name, 'nb'));
                
                // Sett sammen listen igjen (Leder først)
                const sortedEmployees = leader ? [leader, ...others] : others;

                // Tegn ut den SORTERTE listen
                container.innerHTML = sortedEmployees.map(emp => `
                    <div class="employee-card">
                        <div class="image-wrapper">
                            <img src="${emp.img}" alt="${emp.name}" onerror="this.src='https://www.sparebank1.no/etc.clientlibs/s1-platform/clientlibs/clientlib-site/resources/images/avatar.svg'">
                        </div>
                        <div class="name">${emp.name}</div>
                        <div class="role">${emp.role}</div>
                        <div class="phone">Tlf. ${emp.phone}</div>
                        <a href="mailto:${emp.email}" class="email-link">e-post</a>
                    </div>
                `).join('');

            } catch (error) {
                errorLog.style.display = 'block';
                errorLog.innerText = "FEILMELDING:\n" + error.message;
            }
        }

        fetchStaff();
    </script>
</body>
</html>
